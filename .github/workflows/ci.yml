name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [22]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format-check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run type-check

      - name: Test
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Create empty env file for compose validation
        run: touch .env

      - name: Validate docker compose
        run: docker compose config

      - name: Build Docker image
        run: docker build -t chaptify:test .
