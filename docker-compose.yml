services:
    chaptify:
        image: chaptify:latest
        build: .
        command: [node, .output/start.mjs]
        ports:
            # Bind to loopback only: the container's plain-HTTP port is never exposed on a public
            # interface. Local dev (localhost) and `npm run smoke:docker` (127.0.0.1) are
            # unaffected; in production the Caddy service in docker-compose.prod.yml fronts it and
            # reaches it over the internal compose network.
            - "127.0.0.1:3000:3000"
        env_file:
            - path: .env
              required: false
        environment:
            NUXT_STORAGE_ROOT: /data/chaptify
        volumes:
            - chaptify-storage:/data/chaptify
        healthcheck:
            test: [CMD, node, -e, "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
            interval: 30s
            timeout: 5s
            retries: 3
        restart: unless-stopped

    worker:
        image: chaptify:latest
        command: [node, .output/worker.mjs]
        # Give the worker time to abort in-flight FFmpeg work and unwind before SIGKILL.
        stop_grace_period: 30s
        extra_hosts:
            - "host.docker.internal:host-gateway"
        env_file:
            - path: .env
              required: false
        environment:
            NUXT_STORAGE_ROOT: /data/chaptify
            NUXT_MAILGUN_BASE_URL: ${NUXT_MAILGUN_BASE_URL:-}
            NUXT_MAILGUN_DOMAIN: ${NUXT_MAILGUN_DOMAIN:-}
            NUXT_MAILGUN_KEY: ${NUXT_MAILGUN_KEY:-}
            NUXT_MAILGUN_SENDER: ${NUXT_MAILGUN_SENDER:-}
            NUXT_MAILGUN_BCC: ${NUXT_MAILGUN_BCC:-}
        volumes:
            - chaptify-storage:/data/chaptify
        restart: unless-stopped
        depends_on:
            - chaptify

    cleanup:
        image: chaptify:latest
        command: [node, .output/cleanup.mjs]
        env_file:
            - path: .env
              required: false
        environment:
            NUXT_STORAGE_ROOT: /data/chaptify
            NUXT_CLEANUP_INTERVAL_SECONDS: ${NUXT_CLEANUP_INTERVAL_SECONDS:-300}
        volumes:
            - chaptify-storage:/data/chaptify
        restart: unless-stopped
        depends_on:
            - chaptify

volumes:
    chaptify-storage:
